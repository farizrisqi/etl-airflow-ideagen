name: Daily Playwright Automation

on:
  schedule:
    # 01:00 UTC = 08:00 WIB (Senin - Minggu)
    - cron: '0 1 * * *'
  workflow_dispatch: # Supaya bisa tes klik tombol "Run" kapan saja

jobs:
  automation-job:
    runs-on: ubuntu-latest
    
    # Bagian ini menghubungkan "Lemari Rahasia" GitHub ke script Python
    env:
      IDEAGEN_ID: ${{ secrets.IDEAGEN_ID }}
      IDEAGEN_PW: ${{ secrets.IDEAGEN_PW }}
      OPSREPORT_ID: ${{ secrets.OPSREPORT_ID }}
      OPSREPORT_PW: ${{ secrets.OPSREPORT_PW }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run ETL Script
        # Ganti 'main.py' dengan nama file script-mu jika beda
        run: python main.py 

      - name: Save Evidence (Screenshots/Logs)
        if: always() # Tetap dijalankan meskipun script-mu error
        uses: actions/upload-artifact@v4
        with:
          name: hasil-automation
          path: |
            screenshots/
            logs/
          retention-days: 7
