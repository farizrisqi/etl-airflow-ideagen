name: Daily Playwright Automation

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch: 

jobs:
  automation-job:
    runs-on: ubuntu-latest
    
    env:
      IDEAGEN_ID: ${{ secrets.IDEAGEN_ID }}
      IDEAGEN_PW: ${{ secrets.IDEAGEN_PW }}
      OPSREPORT_ID: ${{ secrets.OPSREPORT_ID }}
      OPSREPORT_PW: ${{ secrets.OPSREPORT_PW }}
      GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run ETL Script
        run: python3 main_scheduler.py 

      - name: Save Evidence (Screenshots/Logs)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: hasil-automation
          path: |
            screenshots/
            logs/
          retention-days: 7
