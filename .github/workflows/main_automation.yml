name: Daily ETL Automation

on:
  schedule:
    - cron: '0 22 * * 0-4'  # 05:00 WIB Senin-Jumat
  workflow_dispatch:

jobs:
  automation-job:
    runs-on: ubuntu-latest

    env:
      IDEAGEN_ID: ${{ secrets.IDEAGEN_ID }}
      IDEAGEN_PW: ${{ secrets.IDEAGEN_PW }}
      OPSREPORT_ID: ${{ secrets.OPSREPORT_ID }}
      OPSREPORT_PW: ${{ secrets.OPSREPORT_PW }}
      GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get install -y gnumeric

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run ETL Pipeline
        run: python3 src/utils/main_scheduler.py

      - name: Save Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/debug_*.png
          retention-days: 7
